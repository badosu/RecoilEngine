name: Check Lua library
on:
  workflow_dispatch:
  pull_request:
    paths:
      - rts/Lua/**
      - rts/Rml/SolLua/**/*.cpp
      - doc/site/mise.toml
  push:
    branches:
      - master
    paths:
      - rts/Lua/**
      - rts/Rml/SolLua/**/*.cpp
      - doc/site/mise.toml
env:
  RECOIL_LUA_LIBRARY_DIR: "rts/Lua/library"
  LUA_DOC_EXTRACTOR_SOURCE_REF: "https://github.com/${{ github.repository }}/blob/${{ github.sha }}"
  LUA_DOC_EXTRACTOR_VERSION: "3"
jobs:
  check-library:
    name: Check library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lua CPP files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            rts/Lua
            rts/Rml/SolLua
            doc/site/mise.toml

      - uses: jdx/mise-action@v2
        with:
          install: false # [default: true] we only install deps required by the task
          working_directory: ./doc/site

      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
          key: npm-check-lua-${{ env.LUA_DOC_EXTRACTOR_VERSION }}-${{ github.run_id }}
          restore-keys:
            npm-check-lua-${{ env.LUA_DOC_EXTRACTOR_VERSION }}

      - name: Run lua-language-server --check
        working-directory: ./doc/site
        run: mise run lua_check

      - name: Upload Lua Library artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{github.run_id}}-library
          path: ${{env.RECOIL_LUA_LIBRARY_DIR}}

      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.npm
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
